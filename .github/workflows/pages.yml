name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pandoc wkhtmltopdf

      - name: Build HTML book
        run: |
          mkdir -p site
          pandoc \
            --from=markdown \
            --to=html5 \
            --standalone \
            --toc \
            --toc-depth=3 \
            --number-sections \
            --css=book-style.css \
            --embed-resources --standalone \
            --metadata title="Applying NASA, Automotive & Safety-Critical Engineering to Software" \
            --metadata author="Leonid Bugaev" \
            --metadata date="$(date +%Y-%m-%d)" \
            TABLE_OF_CONTENTS.md \
            research_testing_as_evidence.md \
            research_runtime_monitoring.md \
            research_deployment_safety.md \
            research_incident_analysis.md \
            research_org_independence.md \
            research_dependency_governance.md \
            research_threat_modeling.md \
            research_metrics.md \
            research_adoption_playbook.md \
            -o site/book.html

      - name: Build PDF book
        run: |
          wkhtmltopdf \
            --page-size A4 \
            --margin-top 20mm \
            --margin-bottom 20mm \
            --margin-left 25mm \
            --margin-right 20mm \
            --footer-center '[page]' \
            --footer-font-size 9 \
            --enable-local-file-access \
            site/book.html site/nasa-engineering-for-software.pdf

      - name: Copy site assets
        run: |
          cp index.html site/
          cp mcdc_middleware_refactoring.html site/
          cp book-style.css site/
          cp -r images site/
          cp presentation.md site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
